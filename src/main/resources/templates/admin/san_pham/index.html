<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{/admin/fragments/head :: head}">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.24/css/dataTables.bootstrap4.min.css"/>
</head>

<body class="hold-transition skin-yellow-light sidebar-mini">
<div class="wrapper">
    <header th:replace="~{/admin/fragments/header :: header}"></header>
    <aside th:replace="~{/admin/fragments/sidebar :: sidebar}"></aside>
    <div class="content-wrapper">
        <section class="content-header">
            <h1>Sản phẩm</h1>
            <ol class="breadcrumb">
                <li><a href="/admin/index"><i class="bi bi-house"></i> Home</a></li>
                <li class="active">Quản lý sản phẩm</li>
                <li class="active"><a href="/admin/san-pham">Sản phẩm</a></li>
            </ol>
        </section>

        <section class="content">
            <div class="row">
                <div class="col-xs-12">
                    <div class="box">
                        <div class="box-header">
                            <h3 class="box-title">Danh sách sản phẩm</h3>
                            <button class="btn btn-outline-primary" data-toggle="modal" data-target="#addProduct">Thêm
                                mới
                            </button>
                        </div>

                        <div class="box-body">
                            <div id="san_pham_wrapper" class="dataTables_wrapper form-inline dt-bootstrap">
                                <div class="row">
<!--                                    BOX HEADER-->
                                </div>
                                <div class="row">
                                    <div class="col-sm-12">
                                        <table id="san_pham"
                                               class="table table-bordered table-striped table-hover dataTable"
                                               role="grid" aria-describedby="san_pham_info">
                                            <thead>
                                            <tr>
                                                <th>Mã sản phẩm</th>
                                                <th>Tên sản phẩm</th>
                                                <th>Mô tả</th>
                                                <th>Ngày tạo</th>
                                                <th>Ngày sửa</th>
                                                <th>Trạng thái</th>
                                            </tr>
                                            </thead>
                                            <tbody>
                                            <tr th:each="sanPham : ${list}">
                                                <td th:text="${sanPham.ma}">Mã sản phẩm</td>
                                                <td th:text="${sanPham.ten}">Tên sản phẩm</td>
                                                <td th:text="${sanPham.mo_ta}">Mô tả</td>
                                                <td th:text="${#dates.format(sanPham.ngay_tao, 'dd-MM-yyyy')}">Ngày
                                                    tạo
                                                </td>
                                                <td th:text="${#dates.format(sanPham.ngay_sua, 'dd-MM-yyyy')}">Ngày
                                                    sửa
                                                </td>
                                                <td th:text="${sanPham.trang_thai ? 'Hoạt động' : 'Không hoạt động'}">
                                                    Trạng thái
                                                </td>
                                            </tr>
                                            </tbody>
                                            <tfoot>
                                            <tr>
                                                <th rowspan="1" colspan="1">Mã sản phẩm</th>
                                                <th rowspan="1" colspan="1">Tên sản phẩm</th>
                                                <th rowspan="1" colspan="1">Mô tả</th>
                                                <th rowspan="1" colspan="1">Ngày tạo</th>
                                                <th rowspan="1" colspan="1">Ngày sửa</th>
                                                <th rowspan="1" colspan="1">Trạng thái</th>
                                            </tr>
                                            </tfoot>
                                        </table>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-sm-12">
                                        <div id="detailsDropdown" class="dropdown">
                                            <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                                                <form class="px-4 py-3">
                                                    <div class="form-group">
                                                        <label for="detailName">Tên chi tiết</label>
                                                        <input type="text" class="form-control" id="detailName"
                                                               placeholder="Nhập tên chi tiết">
                                                    </div>
                                                    <div class="form-group">
                                                        <label for="detailDescription">Mô tả chi tiết</label>
                                                        <input type="text" class="form-control" id="detailDescription"
                                                               placeholder="Nhập mô tả chi tiết">
                                                    </div>
                                                    <button type="submit" class="btn btn-primary">Lưu</button>
                                                </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
<!--                                Footer box-->
                            </div>
                        </div>
                    </div>

                </div>

            </div>

    </div>
    </section>
</div>

<footer th:replace="~{/admin/fragments/footer :: footer}"></footer>
</div>

<!-- Add Product Modal -->
<div class="modal fade" id="addProduct" tabindex="-1" role="dialog" aria-labelledby="addProductLabel"
     aria-hidden="true">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title" id="addProductLabel"><b>Thêm sản phẩm mới</b></h4>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form th:action="@{/admin/san-pham/add}" method="post">
                    <div class="form-group">
                        <label for="productCode">Mã sản phẩm</label>
                        <input type="text" class="form-control" id="productCode" name="ma"
                               placeholder="Mã sản phẩm tự động tạo" readonly>
                    </div>
                    <div class="form-group">
                        <label for="productName">Tên sản phẩm</label>
                        <input type="text" class="form-control" id="productName" name="ten"
                               placeholder="Nhập tên sản phẩm">
                    </div>
                    <div class="form-group">
                        <label for="productDescription">Mô tả</label>
                        <input type="text" class="form-control" id="productDescription" name="mo_ta"
                               placeholder="Nhập mô tả sản phẩm">
                    </div>
                    <div class="form-group">
                        <label for="productStatus">Trạng thái</label>
                        <select class="form-control" id="productStatus" name="trang_thai">
                            <option value="true">Hoạt động</option>
                            <option value="false">Không hoạt động</option>
                        </select>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-dismiss="modal">Đóng</button>
                        <button type="submit" class="btn btn-primary">Lưu</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- jQuery 3 -->
<script th:replace="~{/admin/fragments/script :: script}"></script>
<script src="https://code.jquery.com/jquery-3.5.1.js"></script>
<script src="https://cdn.datatables.net/1.10.24/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.10.24/js/dataTables.bootstrap4.min.js"></script>

<script>
    $(document).ready(function () {
        $('#san_pham').DataTable({
            "paging": true,
            "searching": true,
            "lengthChange": false,
            "info": true
        });
        $('#san_pham tbody').on('click', 'tr', function () {
            var id = table.row(this).data('id'); // Lấy id của hàng được click
            // Hiển thị dropdown tương ứng với sản phẩm có id là id
            $('#detailsDropdown').appendTo($(this)).toggle();
        });
    });
</script>
</body>
</html>

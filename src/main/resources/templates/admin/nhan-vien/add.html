<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/admin/fragments/head :: head}"></head>
<body class="hold-transition skin-yellow-light sidebar-mini">
<div class="wrapper">
    <div>
        <header th:replace="~{/admin/fragments/header :: header}"></header>

    </div>
    <div>
        <aside th:replace="~{/admin/fragments/sidebar :: sidebar}"></aside>
    </div>
    <div class="content-wrapper">
        <section class="content-header">
            <h1>Trang khách hàng</h1>
        </section>
        <section class="content">
            <div class="form-them">
                <form th:action="@{/admin/khach-hang/add}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Mã</label>
                            <input type="text" class="form-control" name="ma">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tên</label>
                            <input type="text" class="form-control" name="ten">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" class="form-control" name="soDienThoai">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Mật Khẩu</label>
                            <input type="password" class="form-control" name="matKhau">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Ngày sinh</label>
                            <input type="date" class="form-control" name="ngaySinh">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Người Tạo</label>
                            <input type="text" class="form-control" name="nguoiTao">
                        </div>
                        <div class="col-md-3">
                            <fieldset class="row mb-3">
                                <legend class="col-form-label col-sm-6 pt-0">Giới tính</legend>
                                <div class="col-sm-10">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gioiTinh" id="gridRadios1" value="Nam" checked>
                                        <label class="form-check-label" for="gridRadios1">Nam</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gioiTinh" id="gridRadios2" value="Nữ">
                                        <label class="form-check-label" for="gridRadios2">Nữ</label>
                                    </div>
                                </div>
                            </fieldset>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Trạng Thái</label>
                            <select class="form-select" name="trangThai">
                                <option value="0">Ngừng Hoạt Động</option>
                                <option value="1">Đang Hoạt Động</option>
                            </select>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-outline-primary">Thêm</button>
                    <a th:href="@{/admin/khach-hang/index}" class="btn btn-secondary">Quay lại trang danh sách</a>
                </form>
            </div>

        </section>
    </div>
    <div>
        <footer th:replace="~{/admin/fragments/footer :: footer}"></footer>
    </div>
</div>

<div>
    <script th:replace="~{/admin/fragments/script :: script}"></script>
</div>

</body>
</html>

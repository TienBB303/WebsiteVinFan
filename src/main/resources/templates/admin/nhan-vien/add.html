<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm Nhân Viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1>Thêm Nhân Viên</h1>
    <form th:action="@{/admin/nhan-vien/add}" method="post">
        <div class="mb-3">
            <label for="ma" class="form-label">Mã</label>
            <input type="text" class="form-control" id="ma" name="ma" th:value="${ma}">
        </div>
        <div class="mb-3">
            <label for="ten" class="form-label">Tên</label>
            <input type="text" class="form-control" id="ten" name="ten" th:value="${ten}">
        </div>
        <div class="mb-3">
            <label for="gioiTinh" class="form-label">Giới Tính</label>
            <select class="form-control" id="gioiTinh" name="gioiTinh" th:value="${gioiTinh}">
                <option value="1">Nam</option>
                <option value="0">Nữ</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Ngày sinh</label>
            <input type="date" class="form-control" id="ngaySinh" name="ngaySinh" th:value="${ngaySinh}">
        </div>
        <div class="mb-3">
            <label for="soDienThoai" class="form-label">Số Điện Thoại</label>
            <input type="text" class="form-control" id="soDienThoai" name="soDienThoai" th:value="${soDienThoai}">
        </div>
        <div class="mb-3">
            <label for="canCuocCongDan" class="form-label">Căn cước công dân</label>
            <input type="text" class="form-control" id="canCuocCongDan" name="canCuocCongDan" th:value="${canCuocCongDan}">
        </div>
        <div class="mb-3">
            <label for="diaChi" class="form-label">Địa chỉ</label>
            <input type="text" class="form-control" id="diaChi" name="diaChi" th:value="${diaChi}">
        </div>
        <div class="mb-3">
            <label  class="form-label">Email</label>
            <input type="text" class="form-control" id="email" name="email" th:value="${email}">
        </div>
        <div class="mb-3">
            <label for="matKhau" class="form-label">Mật khẩu</label>
            <input type="password" class="form-control" id="matKhau" name="matKhau">
        </div>
        <div class="col-md-2">
            <label class="form-label">Ngày tạo</label>
            <input type="date" class="form-control"  name="ngayTao" >
        </div>
        <div class="mb-3">
            <label for="chucVu" class="form-label">Chức Vụ</label>
            <select class="form-control" id="chucVu" name="chucVu" th:value="${chucVu}">
                <option th:each="chucVu : ${chucVuList}" th:value="${chucVu.id}" th:text="${chucVu.viTri}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <label class="form-label">Trạng Thái</label>
            <select class="form-select" name="trangThai">
                <option value="0">Ngừng Hoạt Động</option>
                <option value="1">Đang Hoạt Động</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Thêm</button>
    </form>
</div>
</body>
</html>

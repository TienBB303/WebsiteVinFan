
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/admin/fragments/head :: head}"></head>
<body class="hold-transition skin-yellow-light sidebar-mini">
<!-- Site wrapper -->
<div class="wrapper">
    <div>
        <header th:replace="~{/admin/fragments/header :: header}"></header>
    </div>

    <!-- Left side column. contains the sidebar -->
    <div>
        <aside th:replace="~{/admin/fragments/sidebar :: sidebar}"></aside>
    </div>

    <!-- Content Wrapper. Contains page content -->
    <div class="content-wrapper">
        <!-- Content Header (Page header) -->
        <section class="content-header">
            <h1>trang hoa don</h1>
        </section>
        <!-- Main content -->
        <section class="content">
            <div class="container">
                <h1>Danh Sách Nhân Viên</h1>
                <a th:href="@{/admin/nhan-vien/from-them}" class="btn btn-primary">Thêm Nhân Viên</a>
                <table class="table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Mã</th>
                        <th>Tên</th>
                        <th>Giới Tính</th>
                        <th>Ngày Sinh</th>
                        <th>Số Điện Thoại</th>
                        <th>Căn cước công dân</th>
                        <th>Địa chỉ</th>
                        <th>Email</th>
                        <th>Mật Khẩu</th>
                        <th>Chức Vụ</th>
                        <th>Ngày Tạo</th>
                        <th>Ngày Sửa</th>
                        <th>Người Tạo</th>
                        <th>Người Sửa</th>
                        <th>Trạng Thái</th>
                        <th>Thao Tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="nhanVien : ${listsNhanVien}">
                        <td th:text="${nhanVien.id}"></td>
                        <td th:text="${nhanVien.ma}"></td>
                        <td th:text="${nhanVien.ten}"></td>
                        <td th:text="${nhanVien.gioiTinh ? 'Nam' : 'Nữ'}"></td>
                        <td th:text="${#dates.format(nhanVien.ngaySinh, 'dd/MM/yyyy')}"></td>
                        <td th:text="${nhanVien.soDienThoai}"></td>
                        <td th:text="${nhanVien.canCuocCongDan}"></td>
                        <td th:text="${nhanVien.diaChi}"></td>
                        <td th:text="${nhanVien.email}"></td>
                        <td th:text="${nhanVien.matKhau}"></td>
                        <td th:text="${nhanVien.chucVu.viTri}"></td>
                        <td th:text="${#dates.format(nhanVien.ngayTao, 'dd/MM/yyyy')}"></td>
                        <td th:text="${#dates.format(nhanVien.ngaySua, 'dd/MM/yyyy')}"></td>
                        <td th:text="${nhanVien.nguoiTao}"></td>
                        <td th:text="${nhanVien.nguoiSua}"></td>
                        <td th:text="${nhanVien.trangThai != null ? (nhanVien.trangThai ? 'đang hoạt động' : 'ngừng hoạt động') : 'chưa xác định'}"></td>

                        <td>
                            <a th:href="@{/admin/nhan-vien/from-sua/{id}(id=${nhanVien.id})}" class="btn btn-secondary">Sửa</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>

    </div>
    <!-- /.content-wrapper -->

    <div>
        <footer th:replace="~{/admin/fragments/footer :: footer}"></footer>
    </div>

</div>
<!-- ./wrapper -->

<!-- jQuery 3 -->
<div>
    <script th:replace="~{/admin/fragments/script :: script}"></script>
</div>

</body>
</html>

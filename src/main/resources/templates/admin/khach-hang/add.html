<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Khách Hàng</title>
    <link rel="stylesheet" th:href="@{/kh/css/trangThem.css}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body>
<div class="bg-image">
    <div class="from-them">
        <form th:action="@{/admin/khach-hang/add}" method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Mã</label>
                    <input type="text" class="form-control" name="ma">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Tên</label>
                    <input type="text" class="form-control" name="ten">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text" class="form-control" name="soDienThoai">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Mật Khẩu</label>
                    <input type="password" class="form-control" name="matKhau">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Ngày sinh</label>
                    <input type="date" class="form-control" name="ngaySinh">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Ngày tạo</label>
                    <input type="date" class="form-control"  name="ngayTao" >
                </div>
                <div class="col-md-2">
                    <label class="form-label">Người Tạo</label>
                    <input type="text" class="form-control" name="nguoiTao">
                </div>
                <div class="col-md-3">
                    <fieldset class="row mb-3">
                        <legend class="col-form-label col-sm-6 pt-0">Giới tính</legend>
                        <div class="col-sm-10">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gioiTinh" id="gridRadios1"
                                       value="Nam" checked>
                                <label class="form-check-label" for="gridRadios1">Nam</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="gioiTinh" id="gridRadios2"
                                       value="Nữ">
                                <label class="form-check-label" for="gridRadios2">Nữ</label>
                            </div>
                        </div>
                    </fieldset>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Trạng Thái</label>
                    <select class="form-select" name="trangThai">
                        <option value="0">Ngừng Hoạt Động</option>
                        <option value="1">Đang Hoạt Động</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-outline-primary">Thêm</button>
            <a th:href="@{/admin/khach-hang/index}" class="btn btn-secondary">Quay lại trang danh sách</a>
        </form>
    </div>
</div>
</body>

</html>

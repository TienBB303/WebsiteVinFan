<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{/admin/fragments/head :: head}"></head>
<body class="hold-transition skin-yellow-light sidebar-mini">
<!-- Site wrapper -->
<div class="wrapper">
    <div>
        <header th:replace="~{/admin/fragments/header :: header}"></header>
    </div>

    <!-- Left side column. contains the sidebar -->
    <div>
        <aside th:replace="~{/admin/fragments/sidebar :: sidebar}"></aside>
    </div>

    <!-- Content Wrapper. Contains page content -->
    <div class="content-wrapper">
        <!-- Content Header (Page header) -->
        <section class="content-header">
            <h1>trang hoa don</h1>
        </section>
        <!-- Main content -->
        <section class="content">
            <a th:href="@{/admin/khach-hang/from-them}" class="btn btn-secondary">Thêm</a>

            <table class="table">
                <thead>
                <tr>
                    <th>Mã</th>
                    <th>Tên</th>
                    <th>Giới Tính</th>
                    <th>Số Điện Thoại</th>
                    <th>Email</th>
                    <th>Mật Khẩu</th>
                    <th>Ngày Sinh</th>
                    <th>Ngày Tạo</th>
                    <th>Người Tạo</th>
                    <th>Ngày Sửa</th>
                    <th>Người Sửa</th>
                    <th>Trạng Thái</th>
                    <th>Thao Tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="khachHang : ${listsKhachhang}">
                    <td th:text="${khachHang.ma}"></td>
                    <td th:text="${khachHang.ten}"></td>
                    <td th:text="${khachHang.gioiTinh}"></td>
                    <td th:text="${khachHang.soDienThoai}"></td>
                    <td th:text="${khachHang.email}"></td>
                    <td th:text="${khachHang.matKhau}"></td>
                    <td th:text="${#dates.format(khachHang.ngaySinh,'dd/mm/yyyy')}"></td>
                    <td th:text="${#dates.format(khachHang.ngayTao,'dd/mm/yyyy')}"></td>
                    <td th:text="${khachHang.nguoiTao}"></td>
                    <td th:text="${#dates.format(khachHang.ngaySua,'dd/mm/yyyy')}"></td>
                    <td th:text="${khachHang.nguoiSua}"></td>
                    <td th:text="${khachHang.trangThai ? 'Hoạt động' : 'Không hoạt động'}"></td>
                    <td>
                        <a th:href="@{/admin/khach-hang/from-sua/{id}(id=${khachHang.id})}" class="btn btn-secondary">Sửa</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

    </div>
    <!-- /.content-wrapper -->

    <div>
        <footer th:replace="~{/admin/fragments/footer :: footer}"></footer>
    </div>

</div>
<!-- ./wrapper -->

<!-- jQuery 3 -->
<div>
    <script th:replace="~{/admin/fragments/script :: script}"></script>
</div>

</body>
</html>

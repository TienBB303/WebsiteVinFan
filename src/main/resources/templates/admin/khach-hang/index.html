<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{/admin/fragments/head :: head}">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.10.24/css/dataTables.bootstrap4.min.css"/>
    <style>
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
        }

        input:checked + .slider {
            background-color: #2196F3;
        }

        input:focus + .slider {
            box-shadow: 0 0 1px #2196F3;
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .slider.round {
            border-radius: 34px;
        }

        .slider.round:before {
            border-radius: 50%;
        }
    </style>
</head>

<body class="hold-transition skin-yellow-light sidebar-mini">
<div class="wrapper">
    <header th:replace="~{/admin/fragments/header :: header}"></header>
    <aside th:replace="~{/admin/fragments/sidebar :: sidebar}"></aside>
    <div class="content-wrapper">
        <section class="content-header">
            <h1>khách hàng</h1>
            <ol class="breadcrumb">
                <li><a href="/admin/index"><i class="bi bi-house"></i> Home</a></li>
                <li class="active">Quản lý khách hàng</li>
                <li class="active"><a href="/admin/khach-hang/index"></a> hiển thị danh sách</li>
            </ol>
        </section>

        <section class="content">
            <div class="row">
                <div class="col-xs-12">
                    <div class="box">
                        <div class="box-header">
                            <form th:action="@{/admin/khach-hang/index}" method="get" class="form-inline my-2 my-lg-0">
                                <input id="searchInput" class="form-control mr-sm-2" type="search" placeholder="Tìm kiếm" name="keyword" th:value="${keyword}">

                                <select id="statusFilter" class="form-control mr-sm-2" name="status">
                                    <option value="">Tất cả trạng thái</option>
                                    <option value="">Hoạt động</option>
                                    <option value="0">Không hoạt động</option>
                                </select>

                                Từ ngày: <input id="fromDateFilter" class="form-control mr-sm-2" type="date" name="fromDate">
                                Đến ngày: <input id="toDateFilter" class="form-control mr-sm-2" type="date" name="toDate">

                                <button class="btn btn-outline-success my-2 my-sm-0" type="submit">làm mới</button>
                            </form>

                        </div>

                        <div class="box-body">
                            <div id="san_pham_wrapper" class="dataTables_wrapper form-inline dt-bootstrap">
                                <div class="row">
                                    <div class="col-sm-12">
                                        <a th:href="@{/admin/khach-hang/from-them} "  class="btn btn-info" >Thêm</a>

                                        <table id="customerTable" class="table">
                                            <thead>
                                            <tr>
                                                <th>STT</th>
                                                <th>Mã</th>
                                                <th>Tên</th>
                                                <th>Giới Tính</th>
                                                <th>Số Điện Thoại</th>
                                                <th>Email</th>
                                                <th>Ngày Sinh</th>
<!--                                                <th>Ngày Tạo</th>-->
<!--                                                <th>Ngày Sửa</th>-->
<!--                                                <th>Địa Chỉ</th>-->
                                                <th>Trạng Thái</th>
                                                <th>Thao Tác</th>
                                            </tr>
                                            </thead>
                                            <tbody>
                                            <tr th:each="khachHang, stat : ${listsKhachhang}">
                                                <td th:text="${stat.index + 1}"></td>
                                                <td th:text="${khachHang.ma}"></td>
                                                <td th:text="${khachHang.ten}"></td>
                                                <td th:text="${khachHang.gioiTinh}"></td>
                                                <td th:text="${khachHang.soDienThoai}"></td>
                                                <td th:text="${khachHang.email}"></td>
                                                <td th:text="${#dates.format(khachHang.ngaySinh,'dd/MM/yyyy')}"></td>
<!--                                                <td th:text="${#dates.format(khachHang.ngayTao,'dd/MM/yyyy')}"></td>-->
<!--                                                <td th:text="${#dates.format(khachHang.ngaySua,'dd/MM/yyyy')}"></td>-->
                                                
                                                <td th:text="${khachHang.trangThai ? 'Hoạt động' : 'Không hoạt động'}"></td>
                                                <td>
                                                    <button class="btn btn-outline-success my-2 my-sm-0" type="button">
                                                        <a th:href="@{/admin/khach-hang/from-sua/{id}(id=${khachHang.id})}" class="btn btn-secondary">Sửa</a>
                                                    </button>

                                                </td>
                                            </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-sm-12">
                                        <nav aria-label="Page navigation example">
                                            <ul class="pagination justify-content-end">
                                                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                                                    <a class="page-link" th:href="@{/admin/khach-hang/index(page=${currentPage - 1}, keyword=${keyword})}">Previous</a>
                                                </li>

                                                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}" th:classappend="${currentPage == i} ? 'page-item active' : 'page-item'">
                                                    <a class="page-link" th:href="@{/admin/khach-hang/index(page=${i}, keyword=${keyword})}">[[${i + 1}]]</a>
                                                </li>

                                                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                                                    <a class="page-link" th:href="@{/admin/khach-hang/index(page=${currentPage + 1}, keyword=${keyword})}">Next</a>
                                                </li>
                                            </ul>
                                        </nav>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <!-- Footer box -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer th:replace="~{/admin/fragments/footer :: footer}"></footer>
</div>

<!-- jQuery 3 -->
<script th:replace="~{/admin/fragments/script :: script}"></script>
<script src="https://code.jquery.com/jquery-3.5.1.js"></script>
<script src="https://cdn.datatables.net/1.10.24/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.10.24/js/dataTables.bootstrap4.min.js"></script>
<script>
    $(document).ready(function() {
        var searchInput = $('#searchInput');
        var statusFilter = $('#statusFilter');
        var fromDateFilter = $('#fromDateFilter');
        var toDateFilter = $('#toDateFilter');

        // Xử lý sự kiện khi người dùng thay đổi bất kỳ trường nào
        searchInput.on('input', filterTable);
        statusFilter.on('change', filterTable);
        fromDateFilter.on('change', filterTable);
        toDateFilter.on('change', filterTable);

        // Hàm lọc bảng
        function filterTable() {
            var searchText = searchInput.val().trim().toLowerCase();
            var status = statusFilter.val();
            var fromDate = fromDateFilter.val();
            var toDate = toDateFilter.val();

            $('#customerTable tbody tr').each(function() {
                var row = $(this);
                var rowData = row.find('td');

                var matchSearch = rowData.filter(function() {
                    return $(this).text().toLowerCase().indexOf(searchText) !== -1;
                }).length > 0;

                var matchStatus = status === '' || status === rowData.eq(9).text().toLowerCase(); // Vị trí cột trạng thái
                var matchFromDate = fromDate === '' || new Date(rowData.eq(6).text()) >= new Date(fromDate); // Vị trí cột ngày sinh
                var matchToDate = toDate === '' || new Date(rowData.eq(6).text()) <= new Date(toDate); // Vị trí cột ngày sinh

                if (matchSearch && matchStatus && matchFromDate && matchToDate) {
                    row.show();
                } else {
                    row.hide();
                }
            });
        }
    });
</script>


</body>
</html>

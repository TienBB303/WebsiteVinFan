<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa Nhân Viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1>Sửa Nhân Viên</h1>
    <form th:action="@{/admin/nhan-vien/update}" th:object="${nhanVien}" method="post">
        <input type="hidden" th:field="*{id}" />
        <div class="mb-3">
            <label for="ma" class="form-label">Mã</label>
            <input type="text" class="form-control" id="ma" th:field="*{ma}">
        </div>
        <div class="mb-3">
            <label for="ten" class="form-label">Tên</label>
            <input type="text" class="form-control" id="ten" th:field="*{ten}">
        </div>
        <div class="mb-3">
            <label for="gioiTinh" class="form-label">Giới Tính</label>
            <select class="form-control" id="gioiTinh" th:field="*{gioiTinh}">
                <option value="true" th:selected="*{gioiTinh == true}">Nam</option>
                <option value="false" th:selected="*{gioiTinh == false}">Nữ</option>
            </select>
        </div>
        <div class="mb-3">
            <label for="ngaySinh" class="form-label">Ngày Sinh</label>
            <input type="date" class="form-control" id="ngaySinh" th:field="*{ngaySinh}">
        </div>
        <div class="mb-3">
            <label for="soDienThoai" class="form-label">Số Điện Thoại</label>
            <input type="text" class="form-control" id="soDienThoai" th:field="*{soDienThoai}">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" th:field="*{email}">
        </div>
        <div class="mb-3">
            <label for="chucVu" class="form-label">Chức Vụ</label>
            <select class="form-control" id="chucVu" th:field="*{chucVu.id}">
                <option th:each="chucVu : ${chucVuList}" th:value="${chucVu.id}" th:text="${chucVu.viTri}"></option>
            </select>
        </div>
        <div class="mb-3">
            <label for="ngaySua" class="form-label">Ngày Sửa</label>
            <input type="date" class="form-control" id="ngaySua" th:field="*{ngaySua}" th:value="${nowday}" disabled/>
        </div>
        <button type="submit" class="btn btn-primary">Cập Nhật</button>
    </form>
</div>
</body>
</html>
